name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "History Viewer ${{ github.ref_name }}"
          releaseBody: |
            ## Install

            1. Download `History.Viewer_VERSION_aarch64.dmg` (Apple Silicon) or `History.Viewer_VERSION_x64.dmg` (Intel)
            2. Open the `.dmg` and drag **History Viewer** to Applications
            3. On first launch, macOS may block it since the app is unsigned. Right-click → Open to bypass, or run:
               ```
               xattr -dr com.apple.quarantine "/Applications/History Viewer.app"
               ```

            ## Requirements
            - macOS 11+
            - Full Disk Access for History Viewer in System Settings → Privacy & Security → Full Disk Access
          releaseDraft: true
          prerelease: false
